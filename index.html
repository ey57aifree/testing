<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貪食蛇遊戲 🐍</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1>🐍 貪食蛇</h1>
            <div class="score-board">
                <div class="score-item">
                    <span class="label">分數</span>
                    <span id="score" class="value">0</span>
                </div>
                <div class="score-item">
                    <span class="label">最高分</span>
                    <span id="high-score" class="value">0</span>
                </div>
            </div>
        </header>

        <main class="game-main">
            <canvas id="game-canvas" width="600" height="400"></canvas>
            
            <div id="game-overlay" class="game-overlay">
                <div class="overlay-content">
                    <h2 id="overlay-title">貪食蛇遊戲</h2>
                    <p id="overlay-message">使用方向鍵或 WASD 控制蛇的移動</p>
                    <button id="start-btn" class="btn-primary">開始遊戲</button>
                </div>
            </div>

            <div id="pause-overlay" class="game-overlay" style="display: none;">
                <div class="overlay-content">
                    <h2>遊戲暫停</h2>
                    <p>按下 Space 繼續遊戲</p>
                    <button id="resume-btn" class="btn-primary">繼續</button>
                </div>
            </div>
        </main>

        <aside class="controls-info">
            <h3>🎮 操作說明</h3>
            <div class="control-group">
                <span class="control-key">↑↓←→</span>
                <span class="control-label">方向鍵移動</span>
            </div>
            <div class="control-group">
                <span class="control-key">WASD</span>
                <span class="control-label">替代控制</span>
            </div>
            <div class="control-group">
                <span class="control-key">Space</span>
                <span class="control-label">暫停/繼續</span>
            </div>
            <div class="control-group">
                <span class="control-key">R</span>
                <span class="control-label">重新開始</span>
            </div>
        </aside>
    </div>

    <script src="game.js"></script>
</body>
</html>
